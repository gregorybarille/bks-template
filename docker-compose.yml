services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backstage:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    entrypoint: []
    ports:
      - "3000:3000"
      - "7007:7007"
    volumes:
      - .:/opt/app-root/src
      - node_modules:/opt/app-root/src/node_modules
      - yarn_cache:/opt/app-root/src/.yarn/cache
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      HOST: 0.0.0.0
      WEBPACK_DEV_SERVER_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

  backstage-prod:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    entrypoint: []
    ports:
      - "7007:7007"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  node_modules:
  yarn_cache:
